<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <style>
      .stroke { fill: none; stroke: #FFD32A; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .fill { fill: #FFD32A; }
      .thin { stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Node graph backbone -->
  <g id="graph">
    <path class="stroke" d="M100,100 L130,85">
      <animate attributeName="stroke-dasharray" values="0 60;60 60;0 60" dur="3.5s" repeatCount="indefinite" />
    </path>
    <path class="stroke" d="M100,100 L80,120">
      <animate attributeName="stroke-dasharray" values="0 60;60 60;0 60" dur="3.5s" begin="0.4s" repeatCount="indefinite" />
    </path>
    <path class="stroke" d="M100,100 L65,85">
      <animate attributeName="stroke-dasharray" values="0 60;60 60;0 60" dur="3.5s" begin="0.8s" repeatCount="indefinite" />
    </path>
    <circle cx="100" cy="100" r="3" class="fill"/>
    <circle cx="130" cy="85" r="2.5" class="fill"/>
    <circle cx="80" cy="120" r="2.5" class="fill"/>
    <circle cx="65" cy="85" r="2.5" class="fill"/>
  </g>

  <!-- Icons as nodes -->
  <!-- User icon -->
  <g transform="translate(122,78) scale(0.8)">
    <circle cx="6" cy="4" r="3" class="stroke"/>
    <path d="M1,12 C1,9 11,9 11,12" class="stroke"/>
  </g>
  <!-- Gamepad icon -->
  <g transform="translate(72,114) scale(0.8)">
    <rect x="0" y="6" rx="3" ry="3" width="14" height="8" class="stroke"/>
    <line x1="4" y1="10" x2="8" y2="10" class="stroke"/>
    <line x1="6" y1="8" x2="6" y2="12" class="stroke"/>
    <circle cx="11" cy="10" r="1.3" class="fill"/>
  </g>
  <!-- For (thumb up) -->
  <g transform="translate(56,74) scale(0.85)">
    <path d="M6,6 L6,12 L2,12 L2,6 Z" class="stroke"/>
    <path d="M6,6 C7,3 9,3 10,5 L12,6 C12,8 11,10 10,11 L6,11" class="stroke"/>
  </g>

  <!-- Against (thumb down) -->
  <g transform="translate(136,96) scale(0.85)">
    <path d="M6,12 L6,6 L2,6 L2,12 Z" class="stroke"/>
    <path d="M6,12 C7,15 9,15 10,13 L12,12 C12,10 11,8 10,7 L6,7" class="stroke"/>
  </g>

  <!-- Mini bar chart (grow) -->
  <g transform="translate(32,28)">
    <rect x="0" y="30" width="8" height="0" class="fill">
      <animate attributeName="height" values="0;18;0" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;12;30" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="12" y="30" width="8" height="0" class="fill">
      <animate attributeName="height" values="0;24;0" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
      <animate attributeName="y" values="30;6;30" dur="3.5s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="24" y="30" width="8" height="0" class="fill">
      <animate attributeName="height" values="0;12;0" dur="3.5s" repeatCount="indefinite" begin="0.4s"/>
      <animate attributeName="y" values="30;18;30" dur="3.5s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
  </g>

  <!-- Mini pie chart (sweep) -->
  <g transform="translate(152,32)">
    <circle cx="16" cy="16" r="12" fill="none" stroke="#FFD32A" stroke-width="2" opacity="0.25"/>
    <circle cx="16" cy="16" r="12" fill="none" stroke="#FFD32A" stroke-width="2"
            stroke-dasharray="0 100">
      <animate attributeName="stroke-dasharray" values="0 100;30 100;60 100;0 100" dur="3.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 16 16" to="360 16 16" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
